server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: laravel
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel-logs
          __path__: /var/www/html/storage/logs/*json.log
    pipeline_stages:
      - json:
          expressions:
            level: level_name
            message: message
            context: context
      - labels:
          level: